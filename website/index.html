<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pingmart — WhatsApp, Automated</title>
  <meta name="description" content="Automate your WhatsApp business. Manage orders, answer customer questions, and grow — without lifting a finger.">
  <meta property="og:title" content="Pingmart — Your business, on WhatsApp">
  <meta property="og:description" content="Automate WhatsApp orders, customer questions, and notifications. Join early testers.">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0d1117;
      --card:          #161b22;
      --border:        #30363d;
      --border-subtle: #21262d;
      --text-primary:  #e6edf3;
      --text-secondary:#8b949e;
      --text-muted:    #6e7681;
      --input-bg:      #0d1117;
      --btn-bg:        #f0f6fc;
      --btn-text:      #0d1117;
      --btn-hover:     #ffffff;
      --focus-ring:    rgba(240, 246, 252, 0.18);
      --error:         #f85149;
      --error-dim:     rgba(248, 81, 73, 0.07);
      --error-border:  rgba(248, 81, 73, 0.25);
    }

    html { height: 100%; }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 44px;
      box-shadow:
        0 0 0 1px var(--border-subtle) inset,
        0 24px 48px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 520px) {
      .card { padding: 36px 22px; }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      margin-bottom: 22px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 10px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .wordmark {
      font-size: 1.625rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      height: 46px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 14px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus {
      border-color: var(--text-secondary);
      box-shadow: 0 0 0 3px var(--focus-ring);
    }

    input.field-error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(248, 81, 73, 0.1);
    }

    .submit-btn {
      width: 100%;
      height: 48px;
      margin-top: 26px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .spinner {
      width: 17px;
      height: 17px;
      border: 2px solid rgba(13, 17, 23, 0.25);
      border-top-color: var(--btn-text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-banner {
      display: none;
      background: var(--error-dim);
      border: 1px solid var(--error-border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.85rem;
      color: var(--error);
      margin-top: 14px;
      line-height: 1.55;
    }

    .error-banner a {
      color: var(--error);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 28px 0 0;
    }

    .footnote {
      margin-top: 18px;
      font-size: 0.8125rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }

    .footnote a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
    }

    .footnote a:hover {
      color: var(--text-primary);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .success {
      display: none;
      text-align: center;
      padding: 12px 0 4px;
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success-ring {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      background: var(--border-subtle);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .success-ring svg { color: var(--text-primary); }

    .success h2 {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .success p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="badge">
      <span class="badge-dot"></span>
      Early Tester Access
    </div>

    <div class="brand">
      <div class="brand-icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 1.5C5.58 1.5 2 4.91 2 9.1c0 1.74.62 3.34 1.65 4.62L2.5 17.5l4-1.14A8.45 8.45 0 0 0 10 16.7c4.42 0 8-3.41 8-7.6S14.42 1.5 10 1.5Z" fill="#e6edf3"/>
          <text x="10" y="13.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" font-weight="800" fill="#161b22">P</text>
        </svg>
      </div>
      <span class="wordmark">Pingmart</span>
    </div>

    <p class="tagline">Your business, on WhatsApp — automated.</p>

    <div id="form-wrap">
      <form id="signup-form" novalidate>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name"
            placeholder="Chukwuemeka Obi"
            autocomplete="name" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone"
            placeholder="+234 801 234 5678"
            autocomplete="tel" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email"
            placeholder="you@example.com"
            autocomplete="email" required>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          Join Early Testers
        </button>

        <div class="error-banner" id="error-banner"></div>

      </form>

      <div class="divider"></div>
      <p class="footnote">
        Have a special request? Reach us at
        <a href="mailto:hello@pingmart.io">hello@pingmart.io</a>
      </p>
    </div>

    <div class="success" id="success-state">
      <div class="success-ring">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h2>You're on the list!</h2>
      <p>We'll be in touch soon.</p>
    </div>

  </div>

  <script src="/app.js"></script>
</body>
</html>
